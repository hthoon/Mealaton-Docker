services:
# PSQL
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - mealaton.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

# Spring
  app:
    image: thoony/mealaton-api
    ports:
      - "11111:11111"
    env_file:
      - mealaton.env
    depends_on:
      - db

# FastAPI
  fastapi:
    image: thoony/mealaton-fastapi
    ports:
      - "8000:8000"
    depends_on:
      - app
    environment:
      SPRING_API_URL: http://app:11111
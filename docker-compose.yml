services:
  # PSQL
  db:
    image: postgres:15
    expose:
      - "5432"
    env_file:
      - mealaton.env
    environment:
      POSTGRES_DB: mealaton
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Spring
  app:
    image: thoony/mealaton-api
    expose:
      - "11111"
    env_file:
      - mealaton.env
    depends_on:
      - db

  # FastAPI
  fastapi:
    image: thoony/mealaton-fastapi
    expose:
      - "8000"
    depends_on:
      - app
    environment:
      SPRING_API_URL: http://app:11111

  # Nginx - Spring 서버로만 진입
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

volumes:
  postgres_data:
